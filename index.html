<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESG MailCatcher</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

<h2>ESG MailCatcher</h2>

<div id="result">Chargement...</div>

<script>

Office.onReady(() => {

    const item = Office.context.mailbox?.item;

    if(!item){
        document.getElementById("result").innerText =
        "Page chargée hors Outlook.";
        return;
    }

    let attachments = item.attachments || [];
    let totalSize = 0;

    attachments.forEach(a => totalSize += a.size);

    let sizeMB = totalSize / (1024*1024);

    document.getElementById("result").innerText =
        "Pièces jointes : " + sizeMB.toFixed(2) + " MB";

});

</script>

</body>
</html>
